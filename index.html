<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DodoWB V.0.1.10</title>

    <style>
        :root { --primary: #4361ee; --bg: #fdfdfd; --text: #1a1a1a; --card: #ffffff; --border: #f0f0f0; --date: #7d7d7d; }
        body.dark-mode { --primary: #4cc9f0; --bg: #0f1115; --text: #e8e8e8; --card: #1c1f26; --border: #2d333b; --date: #999999; }
        body { font-family: -apple-system, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 20px; }

        .header {
            background: var(--card);
            padding: 15px 20px;
            border-bottom: 1px solid var(--border);
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo { font-size: 19px; font-weight: 800; }
        .v-badge { font-size: 10px; opacity: 0.5; }

        .container { max-width: 600px; margin: auto; padding: 15px; }

        .search-box {
            width: 100%;
            padding: 12px 15px 12px 42px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--card);
            color: var(--text);
            outline: none;
        }

        .btn-main {
            background: var(--primary);
            color: white;
            display: flex;
            justify-content: center;
            padding: 16px;
            border-radius: 12px;
            text-decoration: none;
            font-weight: 700;
            margin-bottom: 20px;
        }

        .wiki-item {
            background: var(--card);
            padding: 16px;
            margin-bottom: 12px;
            border-radius: 16px;
            border: 1px solid var(--border);
            display: flex;
            gap: 15px;
            cursor: pointer;
        }

        .thumb {
            width: 80px;
            height: 80px;
            border-radius: 12px;
            object-fit: cover;
            background: var(--bg);
            border: 1px solid var(--border);
        }

        .item-info { flex: 1; }
        .item-info b { font-size: 17px; display: block; margin-bottom: 4px; }

        .item-date { font-size: 12px; color: var(--date); }

        .viewer {
            display: none;
            position: fixed;
            inset: 0;
            background: var(--bg);
            z-index: 200;
            overflow-y: auto;
        }

        .v-header {
            position: sticky;
            top: 0;
            background: var(--card);
            padding: 15px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
        }

        .v-body { max-width: 600px; margin: auto; padding: 20px; }
        .v-text { font-size: 17px; line-height: 1.8; white-space: pre-wrap; }

        .skel {
            height: 100px;
            background: var(--card);
            border-radius: 16px;
            margin-bottom: 12px;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse { 50% { opacity: 0.5; } }
    </style>
</head>

<body>

<div class="header">
    <div class="logo">DodoWB <span class="v-badge">V.0.1.10</span></div>
    <div style="display:flex; gap:10px;">
        <button onclick="ambilData()">🔄</button>
        <button onclick="toggleTema()">🌙</button>
    </div>
</div>

<div class="container">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdI7-lqVoq9Vdt0x2l0r8v_vnrXiTsUG7cIoZtgFCBXUmF_Uw/viewform" target="_blank" class="btn-main">
        + Tambah Cerita
    </a>

    <input type="text" id="cari" class="search-box" onkeyup="filter()" placeholder="Cari judul...">

    <div id="loading">
        <div class="skel"></div>
        <div class="skel"></div>
    </div>

    <ul id="listWiki" style="padding:0; list-style:none;"></ul>
</div>

<div id="view" class="viewer">
    <div class="v-header">
        <button onclick="tutup()">✕ Kembali</button>
        <button onclick="shareLink()">🔗</button>
    </div>

    <div id="vImgContainer" style="display:none;">
        <img id="vFoto" style="width:100%;">
    </div>

    <div class="v-body">
        <h1 id="vJdl"></h1>
        <div id="vWaktu"></div>
        <div id="vIsi" class="v-text"></div>
    </div>
</div>

<script>
const URL_JSON = "https://docs.google.com/spreadsheets/d/16Mh5Ql0LTROIsZgdTQtsWNZPcSAR86SvYJO863a5KkQ/gviz/tq?tqx=out:json";
let db = [];

function toggleTema() {
    document.body.classList.toggle("dark-mode");
}

async function ambilData() {
    document.getElementById("loading").style.display = "block";

    const res = await fetch(URL_JSON);
    const text = await res.text();

    const json = JSON.parse(text.substring(47).slice(0, -2));
    const rows = json.table.rows;

    db = rows.map(r => ({
        waktu: r.c[0]?.v || "",
        judul: r.c[1]?.v || "",
        foto: r.c[2]?.v || "",
        isi: r.c[3]?.v || ""
    })).reverse();

    render();
    document.getElementById("loading").style.display = "none";
}

function render() {
    const list = document.getElementById("listWiki");
    list.innerHTML = db.map((item, i) => `
        <li class="wiki-item" onclick="buka(${i})">
            <div class="thumb">📄</div>
            <div class="item-info">
                <b>${item.judul}</b>
                <span class="item-date">${item.waktu}</span>
            </div>
        </li>
    `).join('');
}

function buka(i) {
    const item = db[i];
    document.getElementById("vJdl").innerText = item.judul;
    document.getElementById("vWaktu").innerText = item.waktu;
    document.getElementById("vIsi").innerText = item.isi;

    document.getElementById("view").style.display = "block";
}

function tutup() {
    document.getElementById("view").style.display = "none";
}

function filter() {
    let k = document.getElementById("cari").value.toLowerCase();
    document.querySelectorAll(".wiki-item").forEach(li => {
        li.style.display = li.innerText.toLowerCase().includes(k) ? "flex" : "none";
    });
}

function shareLink() {
    alert("Share belum aktif");
}

ambilData();
</script>

</body>
</html>
