<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>DodoWB V.0.1.10</title>
    <style>
        :root { 
            --primary: #4361ee; 
            --bg: #f8f9fc; 
            --text: #1d1d1f; 
            --card: #ffffff; 
            --border: #edf2f7; 
            --date: #8e8e93;
            --accent: #4cc9f0;
        }
        
        body.dark-mode { 
            --primary: #4cc9f0; 
            --bg: #000000; 
            --text: #f5f5f7; 
            --card: #1c1c1e; 
            --border: #2c2c2e; 
            --date: #98989d;
        }

        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Inter', sans-serif; 
            margin: 0; background: var(--bg); color: var(--text); 
            transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1); padding-bottom: 20px; 
            -webkit-font-smoothing: antialiased;
        }
        
        .header { 
            background: var(--card); padding: 15px 20px; 
            border-bottom: 1px solid var(--border); position: sticky; 
            top: 0; z-index: 100; display: flex; justify-content: space-between; 
            align-items: center;
        }
        .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; }
        .v-badge { font-size: 10px; background: var(--border); padding: 2px 6px; border-radius: 6px; margin-left: 6px; color: var(--date); }
        
        .progress-container { position: fixed; top: 0; left: 0; width: 100%; height: 3px; z-index: 201; }
        .progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.1s; }

        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        .search-wrapper { position: relative; margin-bottom: 20px; }
        .search-box { 
            width: 100%; padding: 12px 15px 12px 42px; border-radius: 14px; 
            border: 2px solid var(--border); background: var(--card); 
            color: var(--text); box-sizing: border-box; font-size: 16px; outline: none;
            transition: 0.2s;
        }
        .search-box:focus { border-color: var(--primary); box-shadow: 0 0 0 4px rgba(67, 97, 238, 0.1); }
        .s-icon { position: absolute; left: 15px; top: 13px; opacity: 0.3; font-size: 18px; }

        .btn-main { 
            background: var(--primary); color: white; display: flex; 
            align-items: center; justify-content: center; gap: 10px;
            padding: 16px; border-radius: 14px; text-decoration: none; 
            font-weight: 700; margin-bottom: 25px; transition: 0.2s;
        }
        .btn-main:active { transform: scale(0.96); opacity: 0.9; }

        .wiki-item { 
            background: var(--card); padding: 12px; margin-bottom: 12px; 
            border-radius: 18px; border: 1px solid var(--border); 
            display: flex; gap: 14px; cursor: pointer; transition: 0.2s;
        }
        .wiki-item:active { background: var(--border); transform: scale(0.98); }
        .thumb { width: 80px; height: 80px; border-radius: 14px; object-fit: cover; background: var(--bg); flex-shrink: 0; }
        
        .item-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; }
        .item-info b { font-size: 17px; margin-bottom: 4px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .item-date { font-size: 12px; color: var(--date); }
        
        /* VIEWER */
        .viewer { display: none; position: fixed; inset: 0; background: var(--bg); z-index: 200; overflow-y: auto; }
        .v-header { position: sticky; top: 0; background: var(--card); padding: 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; }
        .v-img-box { width: 100%; height: 280px; background: #000; display: flex; align-items: center; justify-content: center; }
        .v-img { max-width: 100%; max-height: 100%; object-fit: contain; }
        .v-body { max-width: 600px; margin: auto; padding: 25px 20px; }
        .v-text { font-size: 18px; line-height: 1.8; white-space: pre-wrap; word-wrap: break-word; color: var(--text); }

        .skel { height: 100px; background: var(--card); border-radius: 18px; margin-bottom: 12px; animation: pulse 1.5s infinite; }
        @keyframes pulse { 50% { opacity: 0.4; } }
    </style>
</head>
<body>

<div class="progress-container"><div class="progress-bar" id="myBar"></div></div>

<div class="header">
    <div class="logo">DodoWB<span class="v-badge">V.0.1.10</span></div>
    <div style="display:flex; gap:10px;">
        <button class="btn-round" style="background:none; border:1px solid var(--border); border-radius:10px; width:38px; height:38px; color:var(--text); cursor:pointer;" onclick="ambilData()">🔄</button>
        <button class="btn-round" id="btnTheme" style="background:none; border:1px solid var(--border); border-radius:10px; width:38px; height:38px; color:var(--text); cursor:pointer;" onclick="toggleTema()">🌙</button>
    </div>
</div>

<div class="container">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdI7-lqVoq9Vdt0x2l0r8v_vnrXiTsUG7cIoZtgFCBXUmF_Uw/viewform" target="_blank" class="btn-main">
        <span>+</span> Tambah Artikel
    </a>

    <div class="search-wrapper">
        <span class="s-icon">🔍</span>
        <input type="text" id="cari" class="search-box" onkeyup="filter()" placeholder="Cari judul...">
    </div>
    
    <div id="loading">
        <div class="skel"></div>
        <div class="skel"></div>
    </div>
    <ul id="listWiki" style="padding:0; list-style:none;"></ul>
</div>

<div id="view" class="viewer" onscroll="moveProgress()">
    <div class="v-header">
        <button onclick="tutup()" style="background:none; border:none; font-size:16px; font-weight:bold; color:var(--text); cursor:pointer;">✕ Tutup</button>
        <button onclick="shareLink()" style="background:none; border:none; font-size:20px; color:var(--text);">🔗</button>
    </div>
    <div id="vImgContainer" class="v-img-box">
        <img id="vFoto" class="v-img" src="">
    </div>
    <div class="v-body">
        <h1 id="vJdl" style="font-size:26px; margin-bottom:10px; line-height:1.2;"></h1>
        <div id="vWaktu" style="color:var(--date); font-size:13px; margin-bottom:20px;"></div>
        <div id="vIsi" class="v-text"></div>
        <div style="padding:40px 0;">
            <button onclick="tutup()" style="width:100%; padding:16px; border-radius:15px; border:1px solid var(--border); background:var(--card); color:var(--text); font-weight:700;">Kembali ke Index</button>
        </div>
    </div>
</div>

<script>
    const URL_CSV = "https://docs.google.com/spreadsheets/d/16Mh5Ql0LTROIsZgdTQtsWNZPcSAR86SvYJO863a5KkQ/export?format=csv"; 
    let db = [];

    function toggleTema() {
        document.body.classList.toggle("dark-mode");
        let isDark = document.body.classList.contains("dark-mode");
        document.getElementById("btnTheme").innerText = isDark ? "☀️" : "🌙";
        localStorage.setItem("temaDodo", isDark ? "dark" : "light");
    }

    if(localStorage.getItem("temaDodo") === "dark") {
        document.body.classList.add("dark-mode");
        document.getElementById("btnTheme").innerText = "☀️";
    }

    function moveProgress() {
        var winScroll = document.getElementById("view").scrollTop;
        var height = document.getElementById("view").scrollHeight - document.getElementById("view").clientHeight;
        var scrolled = (winScroll / height) * 100;
        document.getElementById("myBar").style.width = scrolled + "%";
    }

    async function ambilData() {
        document.getElementById("loading").style.display = "block";
        try {
            const res = await fetch(URL_CSV + "&v=" + Date.now());
            const text = await res.text();
            const rows = text.split("\n").slice(1);
            
            db = rows.map(row => {
                const col = row.split(/,(?=(?:(?:[^"]*"){2})*[^"]*$)/);
                return {
                    waktu: (col[0] || "").replace(/"/g, "").trim(),
                    judul: (col[1] || "").replace(/"/g, "").trim(),
                    foto: (col[2] || "").replace(/"/g, "").replace("file/d/", "uc?export=view&id=").split("/view")[0].trim(),
                    isi: (col[3] || "").replace(/"/g, "").trim()
                }
            }).filter(i => i.judul !== "").reverse();

            render();
            document.getElementById("loading").style.display = "none";
        } catch (e) {
            document.getElementById("loading").innerHTML = "Gagal memuat data.";
        }
    }

    function render() {
        const list = document.getElementById("listWiki");
        list.innerHTML = db.map((item, i) => `
            <li class="wiki-item" onclick="buka(${i})">
                ${item.foto.length > 10 ? `<img src="${item.foto}" class="thumb">` : `<div class="thumb" style="display:flex;align-items:center;justify-content:center;background:var(--border);font-size:24px;">📖</div>`}
                <div class="item-info">
                    <b>${item.judul}</b>
                    <span class="item-date">🕒 ${item.waktu.split(' ')[0]}</span>
                </div>
            </li>
        `).join('');
    }

    function buka(i) {
        const item = db[i];
        document.getElementById("vJdl").innerText = item.judul;
        document.getElementById("vWaktu").innerText = "Update Terakhir: " + item.waktu;
        document.getElementById("vIsi").innerText = item.isi;
        
        const f = document.getElementById("vFoto");
        if(item.foto.length > 10) {
            f.src = item.foto;
            document.getElementById("vImgContainer").style.display = "flex";
        } else {
            document.getElementById("vImgContainer").style.display = "none";
        }
        
        document.getElementById("view").style.display = "block";
        document.getElementById("view").scrollTo(0,0);
        document.body.style.overflow = "hidden";
        document.getElementById("myBar").style.width = "0%";
    }

    function tutup() { 
        document.getElementById("view").style.display = "none"; 
        document.body.style.overflow = "auto";
    }

    function filter() {
        let k = document.getElementById("cari").value.toLowerCase();
        document.querySelectorAll(".wiki-item").forEach(li => {
            li.style.display = li.innerText.toLowerCase().includes(k) ? "flex" : "none";
        });
    }

    function shareLink() {
        const t = `${document.getElementById("vJdl").innerText} - DodoWB V.0.1.10\n${window.location.href}`;
        navigator.share ? navigator.share({ text: t }) : (navigator.clipboard.writeText(t), alert("Link disalin"));
    }

    ambilData();
</script>
</body>
</html>
