<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>DodoWB Shared V2.4</title>
    <style>
        :root { --primary: #3366cc; --bg: #ffffff; --text: #202122; --card: #f8f9fa; --border: #a2a9b1; }
        @media (prefers-color-scheme: dark) { :root { --bg: #1a1a1a; --text: #f0f0f0; --card: #2d2d2d; --border: #444; } }
        body { font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; background: var(--bg); color: var(--text); transition: 0.3s; padding-bottom: 30px;}
        
        .header { background: var(--bg); padding: 15px; border-bottom: 3px solid var(--primary); position: sticky; top: 0; z-index: 100; text-align: center; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .logo { font-size: 22px; font-weight: bold; color: var(--primary); }
        .logo span { font-weight: 300; color: var(--text); font-size: 16px;}
        
        .container { max-width: 600px; margin: auto; padding: 15px; }
        
        /* TOMBOL SAKTI KE FORM */
        .btn-add { 
            background: #28a745; color: white; display: block; text-align: center; 
            padding: 15px; border-radius: 12px; text-decoration: none; font-weight: bold; margin-bottom: 25px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1); transition: 0.2s;
        }
        .btn-add:hover { transform: scale(1.02); background: #218838; }

        .search-box { width: 100%; padding: 12px 20px; border-radius: 25px; border: 1px solid var(--border); background: var(--card); color: var(--text); margin-bottom: 20px; outline: none; box-sizing: border-box; font-size: 16px; }
        
        .wiki-list { list-style: none; padding: 0; margin: 0; }
        .wiki-item { background: var(--card); padding: 15px; margin-bottom: 12px; border-radius: 12px; border: 1px solid var(--border); display: flex; align-items: center; gap: 15px; cursor: pointer; transition: 0.2s; }
        .wiki-item:hover { transform: translateY(-2px); border-color: var(--primary); background: #eaf3ff; }
        
        /* Gambar Kecil di List */
        .thumb { width: 60px; height: 60px; border-radius: 8px; object-fit: cover; background: #eee; border: 1px solid var(--border); }
        .item-info b { font-size: 18px; display: block; color: var(--text); }
        
        /* VIEWER HALAMAN */
        .viewer { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: var(--bg); z-index: 200; overflow-y: auto; }
        .v-img { width: 100%; max-height: 300px; object-fit: cover; border-bottom: 2px solid var(--border); display: none;}
        .v-content { max-width: 700px; margin: auto; padding: 20px; }
        .btn-back { background: var(--card); border: 1px solid var(--border); padding: 8px 20px; border-radius: 20px; cursor: pointer; margin-bottom: 20px; color: var(--text); font-weight: bold; }
        .v-title { font-size: 28px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 15px; margin-top: 0;}
        .v-text { font-size: 18px; line-height: 1.8; white-space: pre-wrap; font-family: 'Georgia', serif; }
        
        #loading { text-align: center; margin-top: 50px; font-style: italic; opacity: 0.7; }
    </style>
</head>
<body>

<div class="header">
    <div class="logo">DodoWB <span>Shared V2.4</span></div>
</div>

<div class="container">
    <a href="https://docs.google.com/forms/d/e/1FAIpQLSdI7-lqVoq9Vdt0x2l0r8v_vnrXiTsUG7cIoZtgFCBXUmF_Uw/viewform" target="_blank" class="btn-add">➕ TAMBAH DATA BARU</a>

    <input type="text" id="cari" class="search-box" onkeyup="filter()" placeholder="🔍 Cari pengetahuan kelas...">
    
    <div id="loading">Menghubungkan ke server Google Sheets... 📡</div>
    <ul id="listWiki" class="wiki-list"></ul>
</div>

<div id="view" class="viewer">
    <img id="vFoto" class="v-img" src="" alt="Foto Artikel">
    <div class="v-content">
        <button class="btn-back" onclick="tutup()">← Kembali</button>
        <h1 id="vJdl" class="v-title"></h1>
        <div id="vIsi" class="v-text"></div>
    </div>
</div>

<script>
    // LINK CSV KHUSUS DARI GOOGLE SHEETS JAWABAN LU
    const URL_CSV = "https://docs.google.com/spreadsheets/d/16Mh5Ql0LTROIsZgdTQtsWNZPcSAR86SvYJO863a5KkQ/export?format=csv"; 
    
    let db = [];

    // FUNGSI SUPER BUAT FIX LINK GAMBAR (GOOGLE DRIVE, DLL)
    function fixLinkGambar(url) {
        if (!url) return "";
        url = url.trim();
        
        // Fix Link Google Drive Biasa
        if (url.includes("drive.google.com/file/d/")) {
            let id = url.split("/d/")[1].split("/")[0];
            return "https://drive.google.com/uc?export=view&id=" + id;
        }
        
        // Fix Link Google Drive Download
        if (url.includes("drive.google.com/uc?id=")) {
            return url.replace("export=download", "export=view");
        }

        return url; // Link gambar biasa (.jpg/.png) gak perlu diubah
    }

    // FUNGSI PINTER BACA CSV (BIAR PARAGRAF GAK PISAH-PISAH)
    function parseCSV(str) {
        let arr = [], quote = false;
        for (let row = col = c = 0; c < str.length; c++) {
            let cc = str[c], nc = str[c+1];
            arr[row] = arr[row] || []; arr[row][col] = arr[row][col] || '';
            if (cc == '"' && quote && nc == '"') { arr[row][col] += cc; ++c; continue; }
            if (cc == '"') { quote = !quote; continue; }
            if (cc == ',' && !quote) { ++col; continue; }
            if (cc == '\r' && nc == '\n' && !quote) { ++row; col = 0; ++c; continue; }
            if ((cc == '\n' || cc == '\r') && !quote) { ++row; col = 0; continue; }
            arr[row][col] += cc;
        }
        return arr;
    }

    async function ambilData() {
        try {
            const response = await fetch(URL_CSV);
            const data = await response.text();
            
            // Pake parser pinter biar teks kucing kemarin gak kepotong
            const baris = parseCSV(data).slice(1); 
            
            db = baris.map(col => {
                if (col.length < 3) return null;
                
                // Urutan kolom Google Form Jawaban: 0=Waktu, 1=Judul, 2=Foto, 3=Isi
                return { 
                    judul: col[1] ? col[1].trim() : "", 
                    foto: fixLinkGambar(col[2]), // <--- INI KUNCI FIX GAMBARNYA
                    isi: col[3] ? col[3].trim() : "" 
                };
            }).filter(i => i && i.judul !== "");
            
            document.getElementById("loading").style.display = "none";
            render();
        } catch (e) { 
            console.error(e);
            document.getElementById("loading").innerText = "Gagal mengambil data. Pastikan Sheets sudah dipublikasikan ke web."; 
        }
    }

    function render() {
        const list = document.getElementById("listWiki");
        list.innerHTML = "";
        
        if(db.length === 0) {
            list.innerHTML = "<div style='text-align:center; color:#888; margin-top:20px;'>Library masih kosong. Ayo tambah artikel pertama!</div>";
        }

        db.forEach((item, i) => {
            // Cek apakah ada foto setelah di-fix
            const imgHtml = item.foto && item.foto.length > 10 ? 
                `<img src="${item.foto}" class="thumb" onerror="this.src='https://via.placeholder.com/60?text=Error'">` : 
                `<div class="thumb" style="display:flex;align-items:center;justify-content:center;font-size:24px;">📖</div>`;
            
            list.innerHTML += `<li class="wiki-item" onclick="buka(${i})">${imgHtml}<b>${item.judul}</b></li>`;
        });
    }

    function buka(i) {
        const fotoEl = document.getElementById("vFoto");
        document.getElementById("vJdl").innerText = db[i].judul;
        document.getElementById("vIsi").innerText = db[i].isi;
        
        // Tampilkan foto besar di viewer kalau ada
        if(db[i].foto && db[i].foto.length > 10) { 
            fotoEl.src = db[i].foto; 
            fotoEl.style.display="block"; 
        } else {
            fotoEl.style.display="none"; 
        }
        
        document.getElementById("view").style.display = "block";
        document.getElementById("view").scrollTop = 0; // Reset scroll ke atas
    }

    function tutup() { document.getElementById("view").style.display = "none"; }

    function filter() {
        let k = document.getElementById("cari").value.toLowerCase();
        document.querySelectorAll(".wiki-item").forEach(li => {
            li.style.display = li.innerText.toLowerCase().includes(k) ? "flex" : "none";
        });
    }
    
    ambilData(); // Jalankan otomatis
</script>
</body>
</html>
